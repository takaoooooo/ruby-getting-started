version: 2.1

orbs:
  heroku: circleci/heroku@2.0
jobs:
  deploy:
    executer: heroku/default
    steps:
      - checkout
      - heroku/install
      - heroku/deploy-via-git
workflows:
  heroku_deploy:
    jobs:
      - deploy    

